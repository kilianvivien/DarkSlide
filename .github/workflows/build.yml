name: Build

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Upload artifacts to this existing release tag (e.g. v0.6.0). Leave blank to skip release upload."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.tag != ''
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          notes_file=".github/release-notes/${tag}.md"
          if [[ ! -f "$notes_file" ]]; then
            notes_file=""
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ -n "$notes_file" ]]; then
              gh release edit "$tag" --title "DarkSlide ${tag}" --notes-file "$notes_file"
            else
              gh release edit "$tag" --title "DarkSlide ${tag}" --generate-notes
            fi
          elif [[ -n "$notes_file" ]]; then
            gh release create "$tag" --title "DarkSlide ${tag}" --notes-file "$notes_file"
          else
            gh release create "$tag" --title "DarkSlide ${tag}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            os: macos
          - platform: ubuntu-22.04
            os: linux
          - platform: windows-latest
            os: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build${{ matrix.os == 'macos' && ' -- --target universal-apple-darwin' || '' }}

      # ── macOS: upload .dmg to release ─────────────────────────────────────
      - name: Upload macOS artifacts to release
        if: matrix.os == 'macos' && needs.prepare-release.outputs.tag != ''
        shell: bash
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag }}" \
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Linux: upload .deb and .AppImage to release ───────────────────────
      - name: Upload Linux artifacts to release
        if: matrix.os == 'linux' && needs.prepare-release.outputs.tag != ''
        shell: bash
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag }}" \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Windows: upload .msi and NSIS .exe to release ────────────────────
      - name: Upload Windows artifacts to release
        if: matrix.os == 'windows' && needs.prepare-release.outputs.tag != ''
        shell: bash
        run: |
          gh release upload "${{ needs.prepare-release.outputs.tag }}" \
            src-tauri/target/release/bundle/msi/*.msi \
            src-tauri/target/release/bundle/nsis/*.exe \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Keep workflow artifacts as a fallback ─────────────────────────────
      - name: Save macOS build artifacts
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: darkslide-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Save Linux build artifacts
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: darkslide-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Save Windows build artifacts
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: darkslide-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
